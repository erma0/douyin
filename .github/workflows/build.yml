# ============================================================
# Build & Release 工作流
# ============================================================
# 触发方式：
#   1. 推送代码到 main 分支 → 自动构建，上传 artifact（保留7天）
#   2. 推送 v* tag → 构建 + 发布 GitHub Release
#
# 发布流程：
#   1. 更新版本号（pyproject.toml 和 backend/cli.py）
#   2. git add . && git commit -m "release: v5.2.260514"
#   3. git tag v5.2.260514
#   4. git push origin main --tags
# ============================================================
name: Build

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      # ── Python 环境 ──
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false

      - name: Install Python dependencies
        run: uv sync

      # ── Node 环境 ──
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build frontend
        run: pnpm build
        working-directory: frontend

      # ── 缓存 aria2 ──
      - name: Cache aria2
        id: cache-aria2
        uses: actions/cache@v4
        with:
          path: aria2
          key: aria2-1.36.0-win64

      # ── 下载 aria2（如果缓存未命中）──
      - name: Download aria2
        if: steps.cache-aria2.outputs.cache-hit != 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $aria2Version = "1.36.0"
          $aria2Url = "https://github.com/aria2/aria2/releases/download/release-${aria2Version}/aria2-${aria2Version}-win-64bit-build1.zip"
          $maxRetries = 3
          $retryCount = 0
          $success = $false

          while ($retryCount -lt $maxRetries -and -not $success) {
            try {
              $retryCount++
              Write-Host "尝试下载 aria2 v${aria2Version} (尝试 $retryCount/$maxRetries)..."
              Invoke-WebRequest $aria2Url -OutFile aria2.zip -UseBasicParsing

              if (-not (Test-Path "aria2")) { New-Item -ItemType Directory -Path "aria2" | Out-Null }
              Expand-Archive aria2.zip -DestinationPath aria2_tmp -Force
              $inner = Get-ChildItem aria2_tmp -Directory | Select-Object -First 1
              Copy-Item "$($inner.FullName)\aria2c.exe" "aria2\aria2c.exe"
              Remove-Item -Recurse -Force aria2_tmp, aria2.zip

              $success = $true
              Write-Host "✓ aria2 下载成功"
            } catch {
              Write-Warning "下载失败: $_"
              if ($retryCount -lt $maxRetries) {
                Write-Host "等待 2 秒后重试..."
                Start-Sleep -Seconds 2
              }
            }
          }

          if (-not $success) {
            Write-Error "aria2 下载失败，已尝试 $maxRetries 次"
            exit 1
          }

      # ── PyInstaller 打包 ──
      - name: Build with PyInstaller
        run: uv run python -m PyInstaller scripts/build/pyinstaller-onefile.spec --clean --noconfirm

      - name: Verify build
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/DouyinCrawler.exe")) {
            Write-Error "Build failed: DouyinCrawler.exe not found"
            exit 1
          }
          $size = [math]::Round((Get-Item "dist/DouyinCrawler.exe").Length / 1MB, 2)
          Write-Host "Build successful: DouyinCrawler.exe ($size MB)"

      # ── push main / PR：上传 artifact ──
      - name: Upload artifact
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: DouyinCrawler
          path: dist/DouyinCrawler.exe
          retention-days: 7

      # ── push tag：打包 zip ──
      - name: Create release package
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          $releaseDir = "DouyinCrawler_$tag"
          New-Item -ItemType Directory -Path $releaseDir | Out-Null
          Copy-Item "dist/DouyinCrawler.exe" $releaseDir

          @("README.md", "LICENSE") | ForEach-Object {
            if (Test-Path $_) { Copy-Item $_ $releaseDir }
          }

          Compress-Archive -Path $releaseDir -DestinationPath "DouyinCrawler_$tag.zip"

      # ── push tag：创建 GitHub Release ──
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: DouyinCrawler ${{ github.ref_name }}
          generate_release_notes: true
          files: DouyinCrawler_*.zip
