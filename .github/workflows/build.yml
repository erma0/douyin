# ============================================================
# Build 工作流 - 主分支自动构建
# ============================================================
# 触发方式：
#   1. 推送代码到 main 分支（自动触发）
#      git push origin main
#   2. 向 main 分支提交 Pull Request（自动触发）
#
# 注意：推送 v* 开头的 tag 不会触发此工作流（由 release.yml 处理）
#
# 产物：DouyinCrawler.exe 作为 artifact 保留 7 天
#       可在 GitHub Actions 页面 → 对应运行记录 → Artifacts 下载
# ============================================================
name: Build

on:
  push:
    branches: [main]
    tags-ignore:
      - "v*"
  pull_request:
    branches: [main]

# 同一分支的新推送会取消正在进行的旧构建
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      # ── Python 环境 ──
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false  # 禁用缓存，避免 400 错误

      - name: Install Python dependencies
        run: uv sync

      # ── Node 环境 ──
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      # 缓存 pnpm store，避免每次重新下载 node_modules
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: pnpm-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build frontend
        run: pnpm build
        working-directory: frontend

      # ── 缓存 aria2 ──
      - name: Cache aria2
        id: cache-aria2
        uses: actions/cache@v4
        with:
          path: aria2
          key: aria2-1.36.0-win64

      # ── 下载 aria2（如果缓存未命中）──
      - name: Download aria2
        if: steps.cache-aria2.outputs.cache-hit != 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $aria2Version = "1.36.0"
          $aria2Url = "https://github.com/aria2/aria2/releases/download/release-${aria2Version}/aria2-${aria2Version}-win-64bit-build1.zip"
          $maxRetries = 3
          $retryCount = 0
          $success = $false

          while ($retryCount -lt $maxRetries -and -not $success) {
            try {
              $retryCount++
              Write-Host "尝试下载 aria2 v${aria2Version} (尝试 $retryCount/$maxRetries)..."
              Invoke-WebRequest $aria2Url -OutFile aria2.zip -UseBasicParsing
              
              if (-not (Test-Path "aria2")) { New-Item -ItemType Directory -Path "aria2" | Out-Null }
              Expand-Archive aria2.zip -DestinationPath aria2_tmp -Force
              $inner = Get-ChildItem aria2_tmp -Directory | Select-Object -First 1
              Copy-Item "$($inner.FullName)\aria2c.exe" "aria2\aria2c.exe"
              Remove-Item -Recurse -Force aria2_tmp, aria2.zip
              
              $success = $true
              Write-Host "✓ aria2 下载成功"
            } catch {
              Write-Warning "下载失败: $_"
              if ($retryCount -lt $maxRetries) {
                Write-Host "等待 2 秒后重试..."
                Start-Sleep -Seconds 2
              }
            }
          }

          if (-not $success) {
            Write-Error "aria2 下载失败，已尝试 $maxRetries 次"
            exit 1
          }



      # ── PyInstaller 打包为单文件 exe ──
      - name: Build with PyInstaller
        run: uv run python -m PyInstaller scripts/build/pyinstaller-onefile.spec --clean --noconfirm

      - name: Verify build
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/DouyinCrawler.exe")) {
            Write-Error "Build failed: DouyinCrawler.exe not found"
            exit 1
          }
          $size = [math]::Round((Get-Item "dist/DouyinCrawler.exe").Length / 1MB, 2)
          Write-Host "Build successful: DouyinCrawler.exe ($size MB)"

      # ── 上传产物（在 Actions 页面可下载）──
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DouyinCrawler
          path: dist/DouyinCrawler.exe
          retention-days: 7
